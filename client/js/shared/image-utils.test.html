<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Utils Test</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
      }
      .test-case {
        margin: 20px 0;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
      }
      .test-case h3 {
        margin-top: 0;
        color: #333;
      }
      .test-result {
        background: #f5f5f5;
        padding: 10px;
        border-radius: 4px;
        font-family: monospace;
        margin: 10px 0;
      }
      img {
        max-width: 200px;
        height: auto;
        border: 1px solid #ccc;
        border-radius: 4px;
        margin: 10px 0;
      }
      .success {
        color: green;
      }
      .error {
        color: red;
      }
    </style>
  </head>
  <body>
    <h1>Image Utils Test Suite</h1>
    <div id="test-results"></div>

    <script type="module">
      import {
        getPlaceholderImage,
        getImageUrl,
        setImageWithFallback,
        createImageElement,
        getImageErrorHandler,
      } from './image-utils.js';

      const resultsContainer = document.getElementById('test-results');

      function addTestCase(title, description, result, isSuccess = true) {
        const testDiv = document.createElement('div');
        testDiv.className = 'test-case';
        testDiv.innerHTML = `
        <h3>${title} <span class="${isSuccess ? 'success' : 'error'}">${
          isSuccess ? '✓' : '✗'
        }</span></h3>
        <p>${description}</p>
        <div class="test-result">${result}</div>
      `;
        resultsContainer.appendChild(testDiv);
      }

      // Test 1: Placeholder image
      const placeholder = getPlaceholderImage();
      addTestCase(
        'Test 1: Get Placeholder Image',
        'Should return the correct placeholder path',
        `Result: ${placeholder}`,
        placeholder === '/assets/images/placeholder-room.svg'
      );

      // Test 2: Null/undefined image
      const nullImage = getImageUrl(null);
      addTestCase(
        'Test 2: Null Image URL',
        'Should return placeholder for null input',
        `Result: ${nullImage}`,
        nullImage === '/assets/images/placeholder-room.svg'
      );

      // Test 3: Empty string
      const emptyImage = getImageUrl('');
      addTestCase(
        'Test 3: Empty String',
        'Should return placeholder for empty string',
        `Result: ${emptyImage}`,
        emptyImage === '/assets/images/placeholder-room.svg'
      );

      // Test 4: /assets/ path (no conversion needed)
      const assetsPath = getImageUrl('/assets/uploads/property-123.jpg');
      addTestCase(
        'Test 4: /assets/ Path',
        'Should return /assets/ paths unchanged',
        `Input: /assets/uploads/property-123.jpg<br>Result: ${assetsPath}`,
        assetsPath === '/assets/uploads/property-123.jpg'
      );

      // Test 5: /storage/ path (uploaded files)
      const storagePath = getImageUrl('/storage/properties/1/photo.jpg');
      addTestCase(
        'Test 5: /storage/ Path',
        'Should return /storage/ paths unchanged',
        `Input: /storage/properties/1/photo.jpg<br>Result: ${storagePath}`,
        storagePath === '/storage/properties/1/photo.jpg'
      );

      // Test 6: Full URL (http)
      const httpUrl = getImageUrl('http://example.com/image.jpg');
      addTestCase(
        'Test 6: Full HTTP URL',
        'Should return HTTP URLs unchanged',
        `Result: ${httpUrl}`,
        httpUrl === 'http://example.com/image.jpg'
      );

      // Test 7: Full URL (https)
      const httpsUrl = getImageUrl('https://example.com/image.jpg');
      addTestCase(
        'Test 7: Full HTTPS URL',
        'Should return HTTPS URLs unchanged',
        `Result: ${httpsUrl}`,
        httpsUrl === 'https://example.com/image.jpg'
      );

      // Test 8: /client/assets/ path conversion
      const clientPath = getImageUrl('/client/assets/images/test.jpg');
      addTestCase(
        'Test 8: /client/assets/ Path Conversion',
        'Should convert /client/assets/ to /assets/',
        `Input: /client/assets/images/test.jpg<br>Result: ${clientPath}`,
        clientPath === '/assets/images/test.jpg'
      );

      // Test 9: Error handler string
      const errorHandler = getImageErrorHandler();
      addTestCase(
        'Test 9: Error Handler String',
        'Should return valid onerror handler',
        `Result: ${errorHandler}`,
        errorHandler.includes('this.onerror=null') &&
          errorHandler.includes('/assets/images/placeholder-room.svg')
      );

      // Test 9: Create image element
      const imgElement = createImageElement(
        '/client/assets/images/test.jpg',
        'Test Image',
        'test-class'
      );
      addTestCase(
        'Test 9: Create Image Element',
        'Should create an img element with correct attributes',
        `Tag: ${imgElement.tagName}<br>Alt: ${imgElement.alt}<br>Class: ${
          imgElement.className
        }<br>Has onerror: ${imgElement.onerror !== null}`,
        imgElement.tagName === 'IMG' &&
          imgElement.alt === 'Test Image' &&
          imgElement.className === 'test-class'
      );

      // Test 10: Visual test with actual image
      const visualTestDiv = document.createElement('div');
      visualTestDiv.className = 'test-case';
      visualTestDiv.innerHTML = `
      <h3>Test 10: Visual Test - Placeholder Image <span class="success">✓</span></h3>
      <p>Should display the placeholder image (if it exists)</p>
    `;
      const testImg = createImageElement(null, 'Placeholder Test');
      visualTestDiv.appendChild(testImg);
      resultsContainer.appendChild(visualTestDiv);

      // Test 11: Visual test with broken image
      const brokenTestDiv = document.createElement('div');
      brokenTestDiv.className = 'test-case';
      brokenTestDiv.innerHTML = `
      <h3>Test 11: Visual Test - Broken Image Fallback <span class="success">✓</span></h3>
      <p>Should fallback to placeholder when image fails to load</p>
    `;
      const brokenImg = createImageElement('/nonexistent/image.jpg', 'Broken Image Test');
      brokenTestDiv.appendChild(brokenImg);
      resultsContainer.appendChild(brokenTestDiv);
    </script>
  </body>
</html>
