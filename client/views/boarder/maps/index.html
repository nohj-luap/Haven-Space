<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="../../../assets/favicon.svg" />
    <title>Map View - Haven Space</title>
    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/global.css" />
    <link rel="stylesheet" href="../../../css/components/sidebar.css" />
    <link rel="stylesheet" href="../../../css/components/navbar.css" />
    <link rel="stylesheet" href="../../../css/views/boarder/maps.css" />
  </head>
  <body>
    <div class="boarder-maps-wrapper">
      <!-- Sidebar Container -->
      <div id="sidebar-container"></div>

      <!-- Main Content -->
      <main class="boarder-maps-main">
        <!-- Navbar Container -->
        <div id="navbar-container"></div>

        <div class="maps-container">
          <!-- Map Section (Left) -->
          <div class="map-section">
            <div id="map"></div>

            <!-- Map Controls -->
            <div class="map-controls">
              <button class="map-control-btn" id="locate-me" title="Use my location">
                <span
                  data-icon="target"
                  data-icon-width="24"
                  data-icon-height="24"
                  data-icon-stroke-width="2"
                ></span>
              </button>
              <button class="map-control-btn" id="zoom-in" title="Zoom in">
                <span
                  data-icon="plusLarge"
                  data-icon-width="24"
                  data-icon-height="24"
                  data-icon-stroke-width="2"
                ></span>
              </button>
              <button class="map-control-btn" id="zoom-out" title="Zoom out">
                <span
                  data-icon="minusLarge"
                  data-icon-width="24"
                  data-icon-height="24"
                  data-icon-stroke-width="2"
                ></span>
              </button>
            </div>

            <!-- Legend -->
            <div class="map-legend">
              <div class="legend-item">
                <span class="legend-marker available"></span>
                <span>Available</span>
              </div>
              <div class="legend-item">
                <span class="legend-marker saved"></span>
                <span>Saved</span>
              </div>
              <div class="legend-item">
                <span class="legend-marker applied"></span>
                <span>Applied</span>
              </div>
            </div>
          </div>

          <!-- Search Panel (Right) -->
          <div class="search-panel">
            <div class="search-panel-header">
              <h1 class="search-panel-title">Find a Room Near You</h1>
              <p class="search-panel-subtitle" id="university-subtitle">Near Your University</p>

              <!-- Search Input -->
              <div class="search-input-wrapper">
                <span
                  class="search-icon"
                  data-icon="search"
                  data-icon-width="24"
                  data-icon-height="24"
                  data-icon-stroke-width="2"
                ></span>
                <input
                  type="text"
                  class="search-panel-input"
                  id="search-input"
                  placeholder="Search by location, university, or landmark..."
                />
              </div>

              <!-- Active Filter Tags -->
              <div class="filter-tags" id="filter-tags">
                <!-- Dynamically added when filters are selected -->
              </div>
            </div>

            <div class="search-panel-body">
              <!-- Quick Filters -->
              <div class="quick-filters">
                <button class="quick-filter-btn active" data-distance="500">
                  <span
                    data-icon="target"
                    data-icon-width="24"
                    data-icon-height="24"
                    data-icon-stroke-width="2"
                  ></span>
                  500m
                </button>
                <button class="quick-filter-btn" data-distance="1000">
                  <span
                    data-icon="target"
                    data-icon-width="24"
                    data-icon-height="24"
                    data-icon-stroke-width="2"
                  ></span>
                  1km
                </button>
                <button class="quick-filter-btn" data-distance="2000">
                  <span
                    data-icon="target"
                    data-icon-width="24"
                    data-icon-height="24"
                    data-icon-stroke-width="2"
                  ></span>
                  2km
                </button>
                <button class="quick-filter-btn" data-distance="5000">
                  <span
                    data-icon="target"
                    data-icon-width="24"
                    data-icon-height="24"
                    data-icon-stroke-width="2"
                  ></span>
                  5km
                </button>
              </div>

              <!-- Filters -->
              <div class="filter-section">
                <label class="filter-label">Price Range</label>
                <select class="filter-select" id="price-filter">
                  <option value="">Any Price</option>
                  <option value="0-3000">₱0 - ₱3,000</option>
                  <option value="3000-5000">₱3,000 - ₱5,000</option>
                  <option value="5000-8000">₱5,000 - ₱8,000</option>
                  <option value="8000+">₱8,000+</option>
                </select>

                <label class="filter-label">Property Type</label>
                <select class="filter-select" id="type-filter">
                  <option value="">Any Type</option>
                  <option value="dorm">Dorm</option>
                  <option value="boarding-house">Boarding House</option>
                  <option value="apartment">Apartment</option>
                </select>

                <label class="filter-label">Amenities</label>
                <div class="amenities-grid">
                  <label class="amenity-checkbox">
                    <input type="checkbox" value="wifi" />
                    <span>WiFi</span>
                  </label>
                  <label class="amenity-checkbox">
                    <input type="checkbox" value="ac" />
                    <span>Air Conditioning</span>
                  </label>
                  <label class="amenity-checkbox">
                    <input type="checkbox" value="kitchen" />
                    <span>Kitchen</span>
                  </label>
                  <label class="amenity-checkbox">
                    <input type="checkbox" value="laundry" />
                    <span>Laundry</span>
                  </label>
                  <label class="amenity-checkbox">
                    <input type="checkbox" value="parking" />
                    <span>Parking</span>
                  </label>
                  <label class="amenity-checkbox">
                    <input type="checkbox" value="security" />
                    <span>Security</span>
                  </label>
                </div>

                <button class="search-panel-btn" id="search-btn">Search</button>
              </div>

              <!-- Results -->
              <div class="filter-section">
                <div class="results-header">
                  <span class="results-count"
                    ><strong id="results-count">0</strong> properties found</span
                  >
                  <select class="sort-select" id="sort-select">
                    <option value="distance">Nearest</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                    <option value="rating">Top Rated</option>
                  </select>
                </div>

                <!-- Tabs -->
                <div class="results-tabs">
                  <button class="results-tab active" data-tab="all">All</button>
                  <button class="results-tab" data-tab="saved">
                    Saved
                    <span class="tab-badge" id="saved-count">0</span>
                  </button>
                  <button class="results-tab" data-tab="applied">
                    Applied
                    <span class="tab-badge" id="applied-count">0</span>
                  </button>
                </div>

                <div class="properties-list" id="properties-list">
                  <!-- Property cards will be dynamically loaded here -->
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Leaflet JS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <script type="module">
      import { initSidebar } from '../../../js/components/sidebar.js';
      import { initNavbar } from '../../../js/components/navbar.js';
      import { getState } from '../../../js/shared/state.js';

      let map;
      let markers = [];
      let userLocation = null;
      let currentUser = null;
      let savedRooms = [];
      let appliedRooms = [];
      let currentDistanceFilter = 500; // meters

      // Sample property data (replace with API call)
      const sampleProperties = [
        {
          id: 1,
          title: 'Sunrise Dormitory',
          location: 'Sampaloc, Manila',
          price: 5500,
          lat: 8.15,
          lng: 125.126,
          rating: 4.5,
          amenities: ['wifi', 'ac', 'laundry'],
          type: 'dorm',
          distance: 320,
        },
        {
          id: 2,
          title: 'Green Valley Boarding House',
          location: 'Diliman, Quezon City',
          price: 4500,
          lat: 8.148,
          lng: 125.124,
          rating: 4.3,
          amenities: ['wifi', 'kitchen', 'parking'],
          type: 'boarding-house',
          distance: 580,
        },
        {
          id: 3,
          title: 'Cozy Student Dorm',
          location: 'Near University Ave',
          price: 6000,
          lat: 8.151,
          lng: 125.127,
          rating: 4.7,
          amenities: ['wifi', 'ac', 'laundry', 'security'],
          type: 'dorm',
          distance: 450,
        },
        {
          id: 4,
          title: 'Campus View Boarding House',
          location: 'University Belt, Manila',
          price: 5000,
          lat: 8.1495,
          lng: 125.1255,
          rating: 4.4,
          amenities: ['wifi', 'laundry', 'security'],
          type: 'boarding-house',
          distance: 280,
        },
      ];

      // Initialize the page
      function initPage() {
        // Get current user from state
        currentUser = getState().user || {
          name: 'Juan Dela Cruz',
          university: 'University of the Philippines',
          location: { lat: 8.1489, lng: 125.125 },
        };

        // Initialize sidebar
        initSidebar({
          role: 'boarder',
          user: {
            name: currentUser.name.split(' ')[0],
            initials: currentUser.name
              .split(' ')
              .map(n => n[0])
              .join(''),
            role: 'Boarder',
          },
        });

        // Initialize navbar
        initNavbar({
          user: {
            name: currentUser.name,
            initials: currentUser.name
              .split(' ')
              .map(n => n[0])
              .join(''),
            avatarUrl: '',
          },
          notificationCount: 3,
        });

        // Update university subtitle
        document.getElementById('university-subtitle').textContent = `Near ${
          currentUser.university || 'Your University'
        }`;

        // Initialize map
        initMap();

        // Setup event listeners
        setupEventListeners();

        // Load user data (saved rooms, applications)
        loadUserData();
      }

      // Initialize the map
      function initMap() {
        const defaultLocation = currentUser?.location || [8.1489, 125.125];

        // Create map centered at user's university/location
        map = L.map('map').setView(defaultLocation, 15);

        // Add OpenStreetMap tiles
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {}).addTo(map);

        // Draw user location circle (university radius)
        L.circle(defaultLocation, {
          color: '#4a7c23',
          fillColor: '#4a7c23',
          fillOpacity: 0.1,
          radius: 1000,
        }).addTo(map);

        // Add user location marker
        L.marker(defaultLocation)
          .addTo(map)
          .bindPopup('<strong>Your Location</strong><br>University Area');

        // Add property markers
        addPropertyMarkers(sampleProperties);
      }

      // Load user data (saved rooms, applications)
      function loadUserData() {
        // Simulate API calls - replace with actual API calls
        savedRooms = [2]; // Sample saved room IDs
        appliedRooms = [1]; // Sample applied room IDs

        // Update badge counts
        document.getElementById('saved-count').textContent = savedRooms.length;
        document.getElementById('applied-count').textContent = appliedRooms.length;

        // Re-render markers with user data
        addPropertyMarkers(sampleProperties);
      }

      // Add property markers to map
      function addPropertyMarkers(properties) {
        // Clear existing markers
        markers.forEach(marker => map.removeLayer(marker));
        markers = [];

        properties.forEach(property => {
          // Determine marker type
          let markerType = 'available';
          if (savedRooms.includes(property.id)) markerType = 'saved';
          if (appliedRooms.includes(property.id)) markerType = 'applied';

          // Create custom icon based on marker type
          const icon = createCustomIcon(markerType);

          // Create custom popup content
          const popupContent = createPropertyPopup(property, markerType);

          // Create marker
          const marker = L.marker([property.lat, property.lng], { icon })
            .addTo(map)
            .bindPopup(popupContent);

          markers.push(marker);
        });
      }

      // Create custom icon
      function createCustomIcon(type) {
        const colors = {
          available: '#4a7c23',
          saved: '#f59e0b',
          applied: '#3b82f6',
        };

        return L.divIcon({
          className: 'custom-marker',
          html: `
            <div style="
              background: ${colors[type]};
              width: 30px;
              height: 30px;
              border-radius: 50% 50% 50% 0;
              transform: rotate(-45deg);
              border: 3px solid white;
              box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            "></div>
          `,
          iconSize: [30, 30],
          iconAnchor: [15, 30],
          popupAnchor: [0, -30],
        });
      }

      // Create property popup
      function createPropertyPopup(property, markerType) {
        const statusBadge = {
          available: '',
          saved: '<span class="popup-status-badge saved">★ Saved</span>',
          applied: '<span class="popup-status-badge applied">📄 Applied</span>',
        };

        const actionButton =
          markerType === 'applied'
            ? `<button class="popup-btn" onclick="window.viewApplication(${property.id})">View Application</button>`
            : `<button class="popup-btn popup-btn-primary" onclick="window.viewProperty(${property.id})">View Details</button>`;

        return `
          <div class="property-popup">
            <div class="property-popup-image"></div>
            <div class="property-popup-content">
              ${statusBadge[markerType] || ''}
              <h3 class="property-popup-title">${property.title}</h3>
              <div class="property-popup-location">
                <span data-icon="location" data-icon-width="12" data-icon-height="12" data-icon-stroke-width="1.5"></span>
                ${property.location}
              </div>
              <div class="property-popup-meta">
                <span class="popup-distance">📍 ${property.distance}m from you</span>
                <span class="popup-rating">⭐ ${property.rating}</span>
              </div>
              <div class="property-popup-price">₱${property.price.toLocaleString()}/month</div>
              <div class="property-popup-amenities">
                ${property.amenities
                  .slice(0, 3)
                  .map(a => `<span class="amenity-badge">${a}</span>`)
                  .join('')}
              </div>
              <div class="property-popup-actions">
                <button class="popup-btn popup-btn-outline" onclick="window.saveProperty(${
                  property.id
                })">
                  <span data-icon="bookmark" data-icon-width="16" data-icon-height="16" data-icon-stroke-width="1.5"></span>
                  Save
                </button>
                ${actionButton}
              </div>
            </div>
          </div>
        `;
      }

      // Setup event listeners
      function setupEventListeners() {
        // Search button
        document.getElementById('search-btn').addEventListener('click', performSearch);

        // Search input enter key
        document.getElementById('search-input').addEventListener('keypress', e => {
          if (e.key === 'Enter') performSearch();
        });

        // Locate me button
        document.getElementById('locate-me').addEventListener('click', getUserLocation);

        // Zoom controls
        document.getElementById('zoom-in').addEventListener('click', () => map.zoomIn());
        document.getElementById('zoom-out').addEventListener('click', () => map.zoomOut());

        // Filter changes
        document.getElementById('price-filter').addEventListener('change', updateFilterTags);
        document.getElementById('type-filter').addEventListener('change', updateFilterTags);
        document.querySelectorAll('.amenity-checkbox input').forEach(cb => {
          cb.addEventListener('change', updateFilterTags);
        });

        // Sort change
        document.getElementById('sort-select').addEventListener('change', sortProperties);

        // Quick filter buttons
        document.querySelectorAll('.quick-filter-btn').forEach(btn => {
          btn.addEventListener('click', e => {
            document
              .querySelectorAll('.quick-filter-btn')
              .forEach(b => b.classList.remove('active'));
            e.currentTarget.classList.add('active');
            currentDistanceFilter = parseInt(e.currentTarget.dataset.distance);
            performSearch();
          });
        });

        // Results tabs
        document.querySelectorAll('.results-tab').forEach(tab => {
          tab.addEventListener('click', e => {
            document.querySelectorAll('.results-tab').forEach(t => t.classList.remove('active'));
            e.currentTarget.classList.add('active');
            filterByTab(e.currentTarget.dataset.tab);
          });
        });
      }

      // Perform search with filters
      function performSearch() {
        const searchTerm = document.getElementById('search-input').value;
        const priceRange = document.getElementById('price-filter').value;
        const propertyType = document.getElementById('type-filter').value;
        const amenities = Array.from(
          document.querySelectorAll('.amenity-checkbox input:checked')
        ).map(cb => cb.value);

        // Filter properties
        let filtered = sampleProperties;

        // Apply distance filter
        filtered = filtered.filter(p => p.distance <= currentDistanceFilter);

        if (searchTerm) {
          filtered = filtered.filter(
            p =>
              p.title.toLowerCase().includes(searchTerm.toLowerCase()) ||
              p.location.toLowerCase().includes(searchTerm.toLowerCase())
          );
        }

        if (priceRange) {
          const [min, max] = priceRange.split('-').map(v => (v === '+' ? Infinity : parseInt(v)));
          filtered = filtered.filter(p => p.price >= min && p.price <= (max || Infinity));
        }

        if (propertyType) {
          filtered = filtered.filter(p => p.type === propertyType);
        }

        if (amenities.length > 0) {
          filtered = filtered.filter(p => amenities.every(a => p.amenities.includes(a)));
        }

        // Update results
        updatePropertiesList(filtered);
        addPropertyMarkers(filtered);
      }

      // Filter by tab (all/saved/applied)
      function filterByTab(tab) {
        let filtered = [...sampleProperties];

        if (tab === 'saved') {
          filtered = filtered.filter(p => savedRooms.includes(p.id));
        } else if (tab === 'applied') {
          filtered = filtered.filter(p => appliedRooms.includes(p.id));
        }

        updatePropertiesList(filtered);
        addPropertyMarkers(filtered);
      }

      // Update filter tags display
      function updateFilterTags() {
        const tagsContainer = document.getElementById('filter-tags');
        const tags = [];

        const priceFilter = document.getElementById('price-filter').value;
        if (priceFilter) {
          tags.push({ label: `Price: ${priceFilter}`, type: 'price', value: priceFilter });
        }

        const typeFilter = document.getElementById('type-filter').value;
        if (typeFilter) {
          tags.push({ label: `Type: ${typeFilter}`, type: 'type', value: typeFilter });
        }

        document.querySelectorAll('.amenity-checkbox input:checked').forEach(cb => {
          tags.push({
            label: cb.parentElement.querySelector('span').textContent,
            type: 'amenity',
            value: cb.value,
          });
        });

        tagsContainer.innerHTML = tags
          .map(
            tag => `
          <div class="filter-tag active" data-type="${tag.type}" data-value="${tag.value}">
            ${tag.label}
            <span class="remove-icon" data-icon="close" data-icon-width="16" data-icon-height="16" data-icon-stroke-width="1.5"></span>
          </div>
        `
          )
          .join('');

        // Add remove handlers
        tagsContainer.querySelectorAll('.filter-tag').forEach(tag => {
          tag
            .querySelector('.remove-icon')
            .addEventListener('click', () => removeFilter(tag.dataset.type, tag.dataset.value));
        });
      }

      // Remove a filter
      function removeFilter(type, value) {
        if (type === 'price') {
          document.getElementById('price-filter').value = '';
        } else if (type === 'type') {
          document.getElementById('type-filter').value = '';
        } else if (type === 'amenity') {
          const cb = document.querySelector(`.amenity-checkbox input[value="${value}"]`);
          if (cb) cb.checked = false;
        }
        updateFilterTags();
      }

      // Update properties list
      function updatePropertiesList(properties) {
        const container = document.getElementById('properties-list');
        const countEl = document.getElementById('results-count');

        countEl.textContent = properties.length;

        if (properties.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <span class="empty-state-icon" data-icon="grid2x2" data-icon-width="48" data-icon-height="48" data-icon-stroke-width="1.5"></span>
              <h3 class="empty-state-title">No properties found</h3>
              <p class="empty-state-description">Try adjusting your filters or search area</p>
            </div>
          `;
          return;
        }

        container.innerHTML = properties
          .map(property => {
            const isSaved = savedRooms.includes(property.id);
            const isApplied = appliedRooms.includes(property.id);
            const statusClass = isApplied ? ' applied' : isSaved ? ' saved' : '';
            const statusBadge = isApplied
              ? '<span class="card-status-badge applied">📄 Applied</span>'
              : isSaved
              ? '<span class="card-status-badge saved">★ Saved</span>'
              : '';

            return `
          <div class="property-card${statusClass}" data-id="${property.id}">
            <div class="property-card-image"></div>
            <div class="property-card-content">
              ${statusBadge}
              <div class="property-card-header">
                <h3 class="property-card-title">${property.title}</h3>
                <div class="property-card-rating">
                  <span data-icon="starSolid" data-icon-width="14" data-icon-height="14" style="color: #f59e0b;"></span>
                  ${property.rating}
                </div>
              </div>
              <div class="property-card-location">
                <span data-icon="location" data-icon-width="12" data-icon-height="12" data-icon-stroke-width="1.5"></span>
                ${property.location}
              </div>
              <div class="property-card-meta">
                <span class="card-distance">📍 ${property.distance}m from you</span>
              </div>
              <div class="property-card-footer">
                <div class="property-card-price">₱${property.price.toLocaleString()}<span>/month</span></div>
                <button class="property-card-btn" onclick="window.viewProperty(${
                  property.id
                })">View</button>
              </div>
            </div>
          </div>
        `;
          })
          .join('');
      }

      // Sort properties
      function sortProperties() {
        const sortBy = document.getElementById('sort-select').value;
        let sorted = [...sampleProperties];

        switch (sortBy) {
          case 'price-low':
            sorted.sort((a, b) => a.price - b.price);
            break;
          case 'price-high':
            sorted.sort((a, b) => b.price - a.price);
            break;
          case 'rating':
            sorted.sort((a, b) => b.rating - a.rating);
            break;
          case 'distance':
          default:
            sorted.sort((a, b) => a.distance - b.distance);
            break;
        }

        updatePropertiesList(sorted);
        addPropertyMarkers(sorted);
      }

      // Get user location
      function getUserLocation() {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            position => {
              userLocation = {
                lat: position.coords.latitude,
                lng: position.coords.longitude,
              };

              // Center map on user location
              map.setView([userLocation.lat, userLocation.lng], 15);

              // Add user location marker
              L.marker([userLocation.lat, userLocation.lng])
                .addTo(map)
                .bindPopup('<strong>Your Current Location</strong>')
                .openPopup();

              // Recalculate distances and re-sort
              sortProperties();
            },
            error => {
              alert('Unable to get your location. Please enable location permissions.');
            }
          );
        } else {
          alert('Geolocation is not supported by your browser.');
        }
      }

      // Global functions for popup buttons
      window.viewProperty = id => {
        console.log('View property:', id);
        window.location.href = `../rooms/index.html?id=${id}`;
      };

      window.viewApplication = id => {
        console.log('View application:', id);
        window.location.href = `../applications/index.html?id=${id}`;
      };

      window.saveProperty = id => {
        console.log('Save property:', id);
        // Toggle save status
        if (savedRooms.includes(id)) {
          savedRooms = savedRooms.filter(roomId => roomId !== id);
        } else {
          savedRooms.push(id);
        }
        // Update UI
        loadUserData();
        performSearch();
      };

      // Initialize when page loads
      window.addEventListener('load', initPage);
