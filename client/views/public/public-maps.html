<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg" />
    <title>Map View - Haven Space</title>
    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/global.css" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #map {
        width: 100%;
        height: 100vh;
        position: absolute;
        top: 0;
        left: 0;
      }

      /* Close button */
      .close-button {
        position: absolute;
        top: 16px;
        left: 16px;
        z-index: 1000;
        width: 40px;
        height: 40px;
        background-color: white;
        border: none;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background-color 0.2s ease;
      }

      .close-button:hover {
        background-color: #f5f5f5;
      }

      .close-button svg {
        width: 20px;
        height: 20px;
        stroke: #1a1a1a;
        stroke-width: 2;
      }

      /* Leaflet popup styling */
      .leaflet-popup-content-wrapper {
        border-radius: 8px;
      }

      .leaflet-popup-content {
        font-family: 'Plus Jakarta Sans', sans-serif;
        margin: 8px;
      }
    </style>
  </head>
  <body>
    <button class="close-button" onclick="window.history.back()" aria-label="Close map view">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <script>
      document.addEventListener('DOMContentLoaded', async () => {
        // Default location (Malaybalay City, Mindanao, Philippines)
        const defaultLocation = [8.1489, 125.125];

        // Create map centered at default location
        const map = L.map('map').setView(defaultLocation, 14);

        // Add OpenStreetMap tiles
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
          maxZoom: 19,
          attribution: '© OpenStreetMap',
        }).addTo(map);

        // Determine API base URL
        const API_BASE_URL = window.location.origin.includes('github.io')
          ? 'https://havenspace.com/server/api'
          : window.location.origin.includes('localhost') ||
            window.location.origin.includes('127.0.0.1') ||
            window.location.hostname === 'localhost'
          ? 'http://localhost:8000'
          : '/server/api';

        // Create custom pin icon
        const pinIcon = L.icon({
          iconUrl: '../../assets/images/pin.png',
          iconSize: [40, 50],
          iconAnchor: [20, 50],
          popupAnchor: [0, -50],
        });

        // Fetch properties from API
        try {
          const response = await fetch(`${API_BASE_URL}/api/rooms/public?limit=100`);

          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }

          const result = await response.json();

          if (result.data && result.data.properties) {
            const properties = result.data.properties;

            // Filter properties that have valid coordinates
            const propertiesWithCoords = properties.filter(p => p.latitude && p.longitude);

            // Add pin markers for properties with popup info
            propertiesWithCoords.forEach(property => {
              const marker = L.marker([property.latitude, property.longitude], {
                icon: pinIcon,
              }).addTo(map);

              // Create popup content
              const popupContent = `
                <div style="font-family: 'Plus Jakarta Sans', sans-serif; min-width: 200px;">
                  <h3 style="margin: 0 0 8px 0; font-size: 16px; font-weight: 600;">
                    ${property.title}
                  </h3>
                  <p style="margin: 0 0 8px 0; font-size: 14px; color: #666;">
                    ${property.address}
                  </p>
                  <p style="margin: 0 0 12px 0; font-size: 18px; font-weight: 700; color: #2563eb;">
                    ₱${property.price.toLocaleString()}/month
                  </p>
                  <a 
                    href="find-a-room.html" 
                    style="display: inline-block; padding: 8px 16px; background-color: #2563eb; color: white; text-decoration: none; border-radius: 6px; font-size: 14px; font-weight: 500;"
                  >
                    View Details
                  </a>
                </div>
              `;

              marker.bindPopup(popupContent);
            });

            // If we have properties with coordinates, fit map to show all markers
            if (propertiesWithCoords.length > 0) {
              const bounds = L.latLngBounds(
                propertiesWithCoords.map(p => [p.latitude, p.longitude])
              );
              map.fitBounds(bounds, { padding: [50, 50] });
            }
          }
        } catch (error) {
          console.error('Failed to fetch properties:', error);
          // Continue with default map view if API fails
        }

        // Try to get user's location
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            position => {
              const userLocation = [position.coords.latitude, position.coords.longitude];

              // Add a marker for user's location
              const userIcon = L.icon({
                iconUrl:
                  'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjQiIGhlaWdodD0iMjQiIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPGNpcmNsZSBjeD0iMTIiIGN5PSIxMiIgcj0iOCIgZmlsbD0iIzI1NjNlYiIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIzIi8+Cjwvc3ZnPg==',
                iconSize: [24, 24],
                iconAnchor: [12, 12],
              });

              L.marker(userLocation, { icon: userIcon }).addTo(map).bindPopup('Your Location');

              map.setView(userLocation, 14);
            },
            error => {
              console.log('Geolocation error:', error);
            }
          );
        }
      });
    </script>
  </body>
</html>
