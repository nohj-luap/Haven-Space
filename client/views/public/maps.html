<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg" />
    <title>Find a Room - Map View - Haven Space</title>
    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/global.css" />
    <link rel="stylesheet" href="../../css/views/public/maps.css" />

    <script type="module">
      import { initIconElements } from '../../js/shared/icons.js';
      document.addEventListener('DOMContentLoaded', () => {
        initIconElements();
      });
    </script>
  </head>
  <body>
    <div class="maps-container">
      <!-- Full Screen Map -->
      <div class="map-section">
        <div id="map"></div>

        <!-- Close Button (Top Right) -->
        <button class="map-close-btn" id="close-map" title="Close Map">
          <span
            data-icon="close"
            data-icon-width="20"
            data-icon-height="20"
            data-icon-stroke-width="2"
          ></span>
          <span>Close</span>
        </button>

        <!-- Map Controls -->
        <div class="map-controls">
          <button class="map-control-btn" id="locate-me" title="Use my location">
            <span
              data-icon="target"
              data-icon-width="24"
              data-icon-height="24"
              data-icon-stroke-width="2"
            ></span>
          </button>
          <button class="map-control-btn" id="zoom-in" title="Zoom in">
            <span
              data-icon="plusLarge"
              data-icon-width="24"
              data-icon-height="24"
              data-icon-stroke-width="2"
            ></span>
          </button>
          <button class="map-control-btn" id="zoom-out" title="Zoom out">
            <span
              data-icon="minusLarge"
              data-icon-width="24"
              data-icon-height="24"
              data-icon-stroke-width="2"
            ></span>
          </button>
        </div>
      </div>
    </div>

    <!-- Leaflet JS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="../../js/views/public/maps.js"></script>
  </body>
</html>
