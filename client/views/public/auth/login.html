<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Find Your Place</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/global.css" />
    <link rel="stylesheet" href="../../../css/views/public/auth.css" />
  </head>
  <body>
    <div class="auth-split-container">
      <!-- Left Side - Login Form -->
      <div class="auth-split-left">
        <!-- Header -->
        <header class="auth-split-header">
          <a href="../index.html" class="auth-logo">
            <img
              src="../../../assets/images/Haven_Space_Logo.png"
              alt="Haven Space"
              style="height: 28px; width: auto"
            />
            <span
              style="
                font-family: 'Plus Jakarta Sans', sans-serif;
                font-size: 20px;
                font-weight: 700;
                color: #333333;
                margin-left: 8px;
              "
              >Haven Space</span
            >
          </a>
          <p class="auth-split-header-link">
            Don't have an account? <a href="signup.html">Sign Up</a>
          </p>
        </header>

        <!-- Login Form -->
        <main class="auth-split-content">
          <div class="auth-split-form-wrapper">
            <a href="../index.html" class="back-btn">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
              Back
            </a>
            <h1 class="auth-split-title">Welcome Back!</h1>
            <p class="auth-split-subtitle">
              We're excited to see you again. Please enter your details to continue.
            </p>

            <div class="social-login">
              <button class="social-btn social-btn-google">
                <img
                  src="../../../assets/svg/google-icon-logo.svg"
                  alt="Google"
                  style="width: 18px; height: 18px"
                />
                Log in with Google
              </button>
              <button class="social-btn social-btn-apple">
                <img
                  src="../../../assets/svg/apple-dark-logo.svg"
                  alt="Apple"
                  style="width: 18px; height: 18px"
                />
                Log in with Apple
              </button>
            </div>

            <div class="auth-divider">
              <span>or</span>
            </div>

            <form class="auth-form" id="loginForm">
              <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="form-input"
                  placeholder="Enter your email"
                  required
                />
              </div>

              <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="password-input-wrapper">
                  <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-input"
                    placeholder="Enter your password"
                    required
                  />
                  <button
                    type="button"
                    class="password-toggle"
                    id="passwordToggle"
                    aria-label="Toggle password visibility"
                  >
                    <svg
                      class="eye-open"
                      width="20"
                      height="20"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                      <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <svg
                      class="eye-closed hidden"
                      width="20"
                      height="20"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <path
                        d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                      ></path>
                      <line x1="1" y1="1" x2="23" y2="23"></line>
                    </svg>
                  </button>
                </div>
                <a href="forgot-password.html" class="forgot-password-link">Forgot password?</a>
              </div>

              <button type="submit" class="auth-btn-primary auth-btn-full">Login</button>
            </form>

            <p class="auth-split-footer">© 2024. All Rights Reserved.</p>
          </div>
        </main>
      </div>

      <!-- Right Side - Image -->
      <div class="auth-split-right">
        <div class="auth-split-image-container">
          <img
            src="../../../assets/images/public/login.png"
            alt="Dashboard Preview"
            class="auth-split-image"
          />
        </div>
      </div>
    </div>

    <script src="../../../js/auth/login.js"></script>
  </body>
</html>
