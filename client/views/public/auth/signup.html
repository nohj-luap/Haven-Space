<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="../../../assets/favicon.svg" />
    <title>Sign Up - Find Your Place</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/global.css" />
    <link rel="stylesheet" href="../../../css/views/public/auth.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="auth-header">
      <div class="auth-header-content">
        <a
          href="../index.html"
          class="auth-logo"
          style="display: flex; align-items: center; text-decoration: none"
        >
          <img
            src="../../../assets/images/Haven_Space_Logo.png"
            alt="Haven Space"
            style="height: 28px; width: auto"
          />
          <span
            style="
              font-family: 'Plus Jakarta Sans', sans-serif;
              font-size: 20px;
              font-weight: 700;
              color: #333333;
              margin-left: 8px;
            "
            >Haven Space</span
          >
        </a>
        <div class="auth-header-link hidden" id="headerLinkContainer">
          <span id="headerLinkText"></span>
          <a href="#" id="headerRoleLink"></a>
        </div>
      </div>
    </header>

    <!-- Step 1: Role Selection -->
    <main class="auth-main" id="step1">
      <div class="auth-container">
        <h1 class="auth-title">Join as a landlord or boarder</h1>

        <div class="role-selection">
          <label class="role-card" for="role-boarder">
            <input type="radio" name="role" id="role-boarder" value="boarder" hidden />
            <div class="role-card-content">
              <div class="role-icon">
                <span
                  data-icon="building"
                  data-icon-width="24"
                  data-icon-height="24"
                  data-icon-stroke-width="2"
                ></span>
              </div>
              <span class="role-radio"></span>
            </div>
            <p class="role-text">I'm a boarder,<br />looking for a room</p>
          </label>

          <label class="role-card" for="role-landlord">
            <input type="radio" name="role" id="role-landlord" value="landlord" hidden />
            <div class="role-card-content">
              <div class="role-icon">
                <span
                  data-icon="home"
                  data-icon-width="24"
                  data-icon-height="24"
                  data-icon-stroke-width="2"
                ></span>
              </div>
              <span class="role-radio"></span>
            </div>
            <p class="role-text">I'm a landlord,<br />looking for a boarder</p>
          </label>
        </div>

        <button class="auth-btn-primary" id="continueBtn" disabled>Continue</button>

        <p class="auth-footer-text">Already have an account? <a href="login.html">Log In</a></p>
      </div>
    </main>

    <!-- Decorative Corner Images -->
    <div class="signup-decorative-images">
      <div class="signup-decorative-left">
        <img src="../../../assets/images/public/signup_lower_right.png" alt="" />
      </div>
      <div class="signup-decorative-right">
        <img src="../../../assets/images/public/signup_lower_left.png" alt="" />
      </div>
    </div>

    <!-- Step 2: Signup Form -->
    <main class="auth-main hidden" id="step2">
      <div class="auth-container auth-container-narrow">
        <h1 class="auth-title auth-title-small" id="step2Title">
          Sign up to find <span id="roleTitleText">your perfect match</span>
        </h1>

        <div class="social-signup">
          <button class="social-btn social-btn-apple">
            <img
              src="../../../assets/svg/apple-dark-logo.svg"
              alt="Apple"
              style="width: 18px; height: 18px"
            />
            Continue with Apple
          </button>
          <button class="social-btn social-btn-google">
            <img
              src="../../../assets/svg/google-icon-logo.svg"
              alt="Google"
              style="width: 18px; height: 18px"
            />
            Continue with Google
          </button>
        </div>

        <div class="auth-divider">
          <span>or</span>
        </div>

        <form class="auth-form" id="signupForm">
          <div class="form-row">
            <div class="form-group">
              <label for="firstName" class="form-label">First name</label>
              <input type="text" id="firstName" name="firstName" class="form-input" required />
            </div>
            <div class="form-group">
              <label for="lastName" class="form-label">Last name</label>
              <input type="text" id="lastName" name="lastName" class="form-input" required />
            </div>
          </div>

          <div class="form-group">
            <label for="email" class="form-label" id="emailLabel">Email</label>
            <input type="email" id="email" name="email" class="form-input" required />
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <div class="password-input-wrapper">
              <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                placeholder="Password (8 or more characters)"
                required
                minlength="8"
              />
              <button
                type="button"
                class="password-toggle"
                id="passwordToggle"
                aria-label="Toggle password visibility"
              >
                <span
                  class="eye-open"
                  data-icon="eye"
                  data-icon-width="20"
                  data-icon-height="20"
                  data-icon-stroke-width="2"
                ></span>
                <span
                  class="eye-closed hidden"
                  data-icon="eyeSlash"
                  data-icon-width="20"
                  data-icon-height="20"
                  data-icon-stroke-width="2"
                ></span>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="confirmPassword" class="form-label">Confirm Password</label>
            <div class="password-input-wrapper">
              <input
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                class="form-input"
                placeholder="Confirm your password"
                required
                minlength="8"
              />
              <button
                type="button"
                class="password-toggle"
                id="confirmPasswordToggle"
                aria-label="Toggle password visibility"
              >
                <span
                  class="eye-open"
                  data-icon="eye"
                  data-icon-width="20"
                  data-icon-height="20"
                  data-icon-stroke-width="2"
                ></span>
                <span
                  class="eye-closed hidden"
                  data-icon="eyeSlash"
                  data-icon-width="20"
                  data-icon-height="20"
                  data-icon-stroke-width="2"
                ></span>
              </button>
            </div>
          </div>

          <div class="form-checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" name="terms" required />
              <span class="checkmark"></span>
              <span class="checkbox-text"
                >Yes, I understand and agree to the
                <a href="../terms-of-service.html">Terms of Service</a>, including the
                <a href="../user-agreement.html">User Agreement</a> and
                <a href="../privacy-policy.html">Privacy Policy</a>.</span
              >
            </label>
          </div>

          <button type="submit" class="auth-btn-primary auth-btn-full">Create my account</button>
        </form>

        <p class="auth-footer-text">Already have an account? <a href="login.html">Log In</a></p>
      </div>
    </main>

    <script type="module" src="../../../js/auth/signup.js"></script>
  </body>
</html>
