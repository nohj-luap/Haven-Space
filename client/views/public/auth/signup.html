<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Find Your Place</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/global.css" />
    <link rel="stylesheet" href="../../../css/views/public/auth.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="auth-header">
      <div class="auth-header-content">
        <a
          href="../index.html"
          class="auth-logo"
          style="display: flex; align-items: center; text-decoration: none"
        >
          <img
            src="../../../assets/images/Haven_Space_Logo.png"
            alt="Haven Space"
            style="height: 28px; width: auto"
          />
          <span
            style="
              font-family: 'Plus Jakarta Sans', sans-serif;
              font-size: 20px;
              font-weight: 700;
              color: #333333;
              margin-left: 8px;
            "
            >Haven Space</span
          >
        </a>
        <div class="auth-header-link hidden" id="headerLinkContainer">
          <span id="headerLinkText"></span>
          <a href="#" id="headerRoleLink"></a>
        </div>
      </div>
    </header>

    <!-- Step 1: Role Selection -->
    <main class="auth-main" id="step1">
      <div class="auth-container">
        <h1 class="auth-title">Join as a landlord or boarder</h1>

        <div class="role-selection">
          <label class="role-card" for="role-landlord">
            <input type="radio" name="role" id="role-landlord" value="landlord" hidden />
            <div class="role-card-content">
              <div class="role-icon">
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                  <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
              </div>
              <span class="role-radio"></span>
            </div>
            <p class="role-text">I'm a landlord,<br />looking for a boarder</p>
          </label>

          <label class="role-card" for="role-boarder">
            <input type="radio" name="role" id="role-boarder" value="boarder" hidden />
            <div class="role-card-content">
              <div class="role-icon">
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="3" y1="10" x2="21" y2="10"></line>
                  <path d="M9 22V12h6v10"></path>
                </svg>
              </div>
              <span class="role-radio"></span>
            </div>
            <p class="role-text">I'm a boarder,<br />looking for a room</p>
          </label>
        </div>

        <button class="auth-btn-primary" id="continueBtn" disabled>Continue</button>

        <p class="auth-footer-text">Already have an account? <a href="login.html">Log In</a></p>
      </div>
    </main>

    <!-- Step 2: Signup Form -->
    <main class="auth-main hidden" id="step2">
      <div class="auth-container auth-container-narrow">
        <h1 class="auth-title auth-title-small" id="step2Title">
          Sign up to find <span id="roleTitleText">your perfect match</span>
        </h1>

        <div class="social-signup">
          <button class="social-btn social-btn-apple">
            <img
              src="../../../assets/svg/apple-dark-logo.svg"
              alt="Apple"
              style="width: 18px; height: 18px"
            />
            Continue with Apple
          </button>
          <button class="social-btn social-btn-google">
            <img
              src="../../../assets/svg/google-icon-logo.svg"
              alt="Google"
              style="width: 18px; height: 18px"
            />
            Continue with Google
          </button>
        </div>

        <div class="auth-divider">
          <span>or</span>
        </div>

        <form class="auth-form" id="signupForm">
          <div class="form-row">
            <div class="form-group">
              <label for="firstName" class="form-label">First name</label>
              <input type="text" id="firstName" name="firstName" class="form-input" required />
            </div>
            <div class="form-group">
              <label for="lastName" class="form-label">Last name</label>
              <input type="text" id="lastName" name="lastName" class="form-input" required />
            </div>
          </div>

          <div class="form-group">
            <label for="email" class="form-label" id="emailLabel">Email</label>
            <input type="email" id="email" name="email" class="form-input" required />
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <div class="password-input-wrapper">
              <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                placeholder="Password (8 or more characters)"
                required
                minlength="8"
              />
              <button
                type="button"
                class="password-toggle"
                id="passwordToggle"
                aria-label="Toggle password visibility"
              >
                <svg
                  class="eye-open"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg
                  class="eye-closed hidden"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                  ></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="country" class="form-label">Country</label>
            <select id="country" name="country" class="form-input form-select">
              <option value="US">United States</option>
              <option value="CA">Canada</option>
              <option value="GB">United Kingdom</option>
              <option value="AU">Australia</option>
              <option value="PH">Philippines</option>
              <!-- Add more countries as needed -->
            </select>
          </div>

          <div class="form-checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" name="terms" required />
              <span class="checkmark"></span>
              <span class="checkbox-text"
                >Yes, I understand and agree to the <a href="#">Terms of Service</a>, including the
                <a href="#">User Agreement</a> and <a href="#">Privacy Policy</a>.</span
              >
            </label>
          </div>

          <button type="submit" class="auth-btn-primary auth-btn-full">Create my account</button>
        </form>

        <p class="auth-footer-text">Already have an account? <a href="login.html">Log In</a></p>
      </div>
    </main>

    <script src="../../../js/auth/signup.js"></script>
  </body>
</html>
