<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="../../../assets/favicon.svg" />
    <title>Messages - Haven Space</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/global.css" />
    <link rel="stylesheet" href="../../../css/components/sidebar.css" />
    <link rel="stylesheet" href="../../../css/components/navbar.css" />
    <link rel="stylesheet" href="../../../css/views/landlord/landlord.css" />
    <link rel="stylesheet" href="../../../css/views/landlord/landlord-messages.css" />
  </head>
  <body data-view="landlord" data-dashboard-type="landlord">
    <div class="landlord-dashboard">
      <!-- Sidebar Container -->
      <div id="sidebar-container"></div>

      <!-- Main Content -->
      <main class="landlord-main">
        <!-- Content Wrapper -->
        <div class="landlord-content">
          <!-- Messages Page Layout -->
          <div class="messages-container">
            <!-- Messages Sidebar - Conversation List -->
            <div class="messages-sidebar">
              <div class="messages-sidebar-header">
                <h1>Messages</h1>
                <button class="messages-new-btn" id="messages-new-btn" aria-label="New message">
                  <span
                    data-icon="plus"
                    data-icon-width="24"
                    data-icon-height="24"
                    data-icon-stroke-width="2"
                  ></span>
                  New Message
                </button>
              </div>

              <!-- Search Messages -->
              <div class="messages-search">
                <div class="messages-search-input-wrapper">
                  <span
                    class="messages-search-icon"
                    data-icon="magnifier"
                    data-icon-width="24"
                    data-icon-height="24"
                    data-icon-stroke-width="2"
                  ></span>
                  <input
                    type="text"
                    class="messages-search-input"
                    placeholder="Search messages..."
                    id="messages-search-input"
                  />
                </div>
              </div>

              <!-- Conversation List -->
              <div class="conversations-list" id="conversations-list">
                <div class="empty-conversations">Loading conversations...</div>
              </div>
            </div>

            <!-- Messages Main - Chat Area -->
            <div class="messages-main">
              <!-- Chat Header -->
              <div class="chat-header">
                <div class="chat-header-info">
                  <div class="chat-avatar">
                    <img src="../../../assets/images/default-avatar.png" alt="Avatar" />
                  </div>
                  <div class="chat-header-text">
                    <h2 class="chat-name">Select a conversation</h2>
                    <span class="chat-status">
                      Select a message from the list to start chatting
                    </span>
                  </div>
                </div>
                <div class="chat-header-actions"></div>
              </div>

              <!-- Chat Messages -->
              <div class="chat-messages" id="chat-messages">
                <div class="empty-messages">Select a conversation to view messages</div>
              </div>

              <!-- Chat Input -->
              <div class="chat-input-container">
                <button class="chat-input-btn chat-attach-btn" aria-label="Attach file">
                  <span
                    data-icon="paperClip"
                    data-icon-width="24"
                    data-icon-height="24"
                    data-icon-stroke-width="2"
                  ></span>
                </button>
                <div class="chat-input-wrapper">
                  <input
                    type="text"
                    class="chat-input"
                    placeholder="Type a message..."
                    id="chat-input"
                    autocomplete="off"
                  />
                  <button class="chat-input-btn chat-emoji-btn" aria-label="Emoji">
                    <span
                      data-icon="chat"
                      data-icon-width="24"
                      data-icon-height="24"
                      data-icon-stroke-width="2"
                    ></span>
                  </button>
                </div>
                <button
                  class="chat-input-btn chat-send-btn"
                  id="chat-send-btn"
                  aria-label="Send message"
                >
                  <span
                    data-icon="arrowRightSimple"
                    data-icon-width="24"
                    data-icon-height="24"
                    data-icon-stroke-width="2"
                  ></span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- New Message Modal -->
    <div class="modal-overlay" id="new-message-modal" style="display: none">
      <div class="modal">
        <div class="modal-header">
          <h2>New Message</h2>
          <button class="modal-close" id="modal-close-btn" aria-label="Close">
            <span
              data-icon="close"
              data-icon-width="24"
              data-icon-height="24"
              data-icon-stroke-width="2"
            ></span>
          </button>
        </div>
        <div class="modal-body">
          <form id="new-message-form">
            <div class="form-group">
              <label for="message-recipient">To</label>
              <input type="text" id="message-recipient" placeholder="Search boarders..." required />
            </div>
            <div class="form-group">
              <label for="message-subject">Subject</label>
              <input type="text" id="message-subject" placeholder="Message subject" />
            </div>
            <div class="form-group">
              <label for="message-body">Message</label>
              <textarea
                id="message-body"
                rows="6"
                placeholder="Type your message..."
                required
              ></textarea>
            </div>
            <div class="form-group">
              <label for="message-attachment">Attachment (optional)</label>
              <input type="file" id="message-attachment" />
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="landlord-btn landlord-btn-outline" id="modal-cancel-btn">
            Cancel
          </button>
          <button type="submit" form="new-message-form" class="landlord-btn landlord-btn-primary">
            Send Message
          </button>
        </div>
      </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="../../../js/main.js"></script>
    <script type="module" src="../../../js/views/landlord/messages.js"></script>
  </body>
</html>
