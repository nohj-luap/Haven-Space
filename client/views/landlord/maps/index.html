<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="../../../assets/favicon.svg" />
    <title>Properties Map View - Haven Space</title>
    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../css/global.css" />
    <link rel="stylesheet" href="../../../css/views/landlord/maps.css" />
  </head>
  <body>
    <div class="landlord-map-container">
      <!-- Map Section (Full Screen) -->
      <div class="map-section fullscreen">
        <div id="map"></div>
        <!-- Back Button -->
        <a href="../index.html" class="map-back-btn">
          <span
            data-icon="chevronLeft"
            data-icon-width="24"
            data-icon-height="24"
            data-icon-stroke-width="2"
          ></span>
          Back to Dashboard
        </a>
        <div class="map-instruction">Loading your properties...</div>
      </div>
    </div>

    <!-- Leaflet JS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="../../../js/views/landlord/maps.js"></script>
  </body>
</html>
