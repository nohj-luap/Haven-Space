version: '3.8'

services:
  # PHP Backend
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: haven-space-api
    ports:
      - "8000:80"
    volumes:
      - ./server:/var/www/html
      - ./server/storage:/var/www/html/storage
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=havenspace_db
      - DB_USER=root
      - DB_PASSWORD=root
      - JWT_SECRET=dev_secret_key_change_in_production
      - GOOGLE_CLIENT_ID=your_google_client_id
      - GOOGLE_CLIENT_SECRET=your_google_client_secret
      - GOOGLE_REDIRECT_URI=http://localhost:8000/api/auth/google/callback.php
      - ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      - db
    networks:
      - havenspace-network

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: haven-space-db
    restart: always
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: havenspace_db
    volumes:
      - mysql-data:/var/lib/mysql
      - ./server/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - havenspace-network

  # Frontend (served by Node.js for development)
  frontend:
    image: node:20-alpine
    container_name: haven-space-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    command: sh -c "npm install && npm run serve"
    depends_on:
      - backend
    networks:
      - havenspace-network

volumes:
  mysql-data:

networks:
  havenspace-network:
    driver: bridge
