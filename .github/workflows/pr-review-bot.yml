name: PR Review Bot

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: read

jobs:
  review:
    name: Automated PR Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get PR changes
        uses: tj-actions/changed-files@v44
        id: changed-files

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Prettier check
        id: prettier
        run: |
          if npm run format:check; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "result=✅ Prettier formatting check passed" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "result=❌ Prettier formatting check failed. Run \`npm run format\` to fix." >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Run ESLint
        id: eslint
        run: |
          if npm run lint; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "result=✅ ESLint check passed" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "result=⚠️ ESLint found issues. Run \`npm run lint:fix\` to auto-fix." >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install PHP dependencies
        working-directory: ./server
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHPStan
        id: phpstan
        working-directory: ./server
        run: |
          if vendor/bin/phpstan analyse --no-progress; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "result=✅ PHPStan static analysis passed" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "result=⚠️ PHPStan found issues. Check the Actions tab for details." >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Count changed files
        id: file-count
        run: |
          JS_FILES=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep -E '\.(js|jsx|ts|tsx)$' | wc -l)
          PHP_FILES=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep -E '\.php$' | wc -l)
          CSS_FILES=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep -E '\.css$' | wc -l)
          echo "js_count=$JS_FILES" >> $GITHUB_OUTPUT
          echo "php_count=$PHP_FILES" >> $GITHUB_OUTPUT
          echo "css_count=$CSS_FILES" >> $GITHUB_OUTPUT

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prettierStatus = '${{ steps.prettier.outputs.status }}';
            const prettierResult = '${{ steps.prettier.outputs.result }}';
            const eslintStatus = '${{ steps.eslint.outputs.status }}';
            const eslintResult = '${{ steps.eslint.outputs.result }}';
            const phpstanStatus = '${{ steps.phpstan.outputs.status }}';
            const phpstanResult = '${{ steps.phpstan.outputs.result }}';
            const jsFiles = ${{ steps.file-count.outputs.js_count }};
            const phpFiles = ${{ steps.file-count.outputs.php_count }};
            const cssFiles = ${{ steps.file-count.outputs.css_count }};

            const allPassed = prettierStatus === 'success' && eslintStatus === 'success' && phpstanStatus === 'success';

            const overallStatus = allPassed ? '✅' : '⚠️';
            const overallMessage = allPassed 
              ? 'All automated checks passed! Great work! 🎉' 
              : 'Some automated checks failed. Please review the issues below. 👇';

            const body = `
            ## ${overallStatus} Automated PR Review

            ${overallMessage}

            ### Code Quality Checks

            | Check | Status | Details |
            | ----- | ------ | ------- |
            | **Prettier** | ${prettierStatus === 'success' ? '✅ Pass' : '❌ Fail'} | ${prettierResult} |
            | **ESLint** | ${eslintStatus === 'success' ? '✅ Pass' : '⚠️ Issues'} | ${eslintResult} |
            | **PHPStan** | ${phpstanStatus === 'success' ? '✅ Pass' : '⚠️ Issues'} | ${phpstanResult} |

            ### Files Changed
            - 📜 JavaScript: ${jsFiles} file(s)
            - 🐘 PHP: ${phpFiles} file(s)
            - 🎨 CSS: ${cssFiles} file(s)

            ### Recommendations
            ${allPassed ? '- ✅ Code quality looks good!' : '- 🔧 Please fix the issues identified above\n- Run `npm run format` and `npm run lint:fix` for auto-fixable issues\n- Check the Actions tab for detailed error logs'}

            ---
            *This is an automated review from the PR Review Bot. For manual review, please request a code review from a team member.*
            `;

            // Post as a PR comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

            // Set check run status
            const checkName = 'Automated PR Review';
            const conclusion = allPassed ? 'success' : 'failure';

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: checkName,
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: conclusion,
              output: {
                title: checkName,
                summary: overallMessage
              }
            });
