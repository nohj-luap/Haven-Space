name: Code Quality & Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write

jobs:
  code-quality-security:
    name: Code Quality & Security Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get PR changes (if applicable)
        if: github.event_name == 'pull_request'
        uses: tj-actions/changed-files@v44
        id: changed-files

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install

      - name: Run Prettier check
        id: prettier
        run: |
          if npm run format:check; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "result=✅ Prettier formatting check passed" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "result=❌ Prettier formatting check failed. Run \`npm run format\` to fix." >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Run ESLint with security plugin
        id: eslint
        run: |
          if npm run lint; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "result=✅ ESLint check passed" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "result=⚠️ ESLint found issues. Run \`npm run lint:fix\` to auto-fix." >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Run npm audit (security vulnerabilities)
        id: npm-audit
        run: |
          AUDIT_RESULT=$(npm audit --json 2>/dev/null || true)
          VULN_COUNT=$(echo "$AUDIT_RESULT" | node -e "let data=''; process.stdin.on('data', chunk => data+=chunk); process.stdin.on('end', () => { try { const json = JSON.parse(data); console.log(json.metadata?.vulnerabilities?.total || 0); } catch(e) { console.log(0); } })")
          if [ "$VULN_COUNT" = "0" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "result=✅ No known npm vulnerabilities found" >> $GITHUB_OUTPUT
          else
            echo "status=warning" >> $GITHUB_OUTPUT
            echo "result=⚠️ Found $VULN_COUNT npm vulnerability(ies). Run \`npm audit\` for details." >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          extensions: mbstring, xml, ctype, iconv, mysql

      - name: Install PHP dependencies
        working-directory: ./server
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run PHPStan static analysis
        id: phpstan
        working-directory: ./server
        run: |
          if vendor/bin/phpstan analyse --no-progress; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "result=✅ PHPStan static analysis passed" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "result=⚠️ PHPStan found issues. Check the Actions tab for details." >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Run PHP security check
        id: php-security
        working-directory: ./server
        run: |
          if [ -f "composer.lock" ]; then
            if composer audit 2>&1 | grep -q "No known security vulnerabilities"; then
              echo "status=success" >> $GITHUB_OUTPUT
              echo "result=✅ No PHP security vulnerabilities found" >> $GITHUB_OUTPUT
            else
              echo "status=warning" >> $GITHUB_OUTPUT
              echo "result=⚠️ PHP dependency vulnerabilities detected. Run \`composer audit\` for details." >> $GITHUB_OUTPUT
            fi
          else
            echo "status=skipped" >> $GITHUB_OUTPUT
            echo "result=⏭️ Skipped (no composer.lock)" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Count changed files
        if: github.event_name == 'pull_request'
        id: file-count
        run: |
          JS_FILES=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep -E '\.(js|jsx|ts|tsx)$' | wc -l)
          PHP_FILES=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep -E '\.php$' | wc -l)
          CSS_FILES=$(echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' | grep -E '\.css$' | wc -l)
          echo "js_count=$JS_FILES" >> $GITHUB_OUTPUT
          echo "php_count=$PHP_FILES" >> $GITHUB_OUTPUT
          echo "css_count=$CSS_FILES" >> $GITHUB_OUTPUT

      - name: Post review comment (PR only)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prettierStatus = '${{ steps.prettier.outputs.status }}';
            const prettierResult = '${{ steps.prettier.outputs.result }}';
            const eslintStatus = '${{ steps.eslint.outputs.status }}';
            const eslintResult = '${{ steps.eslint.outputs.result }}';
            const npmAuditStatus = '${{ steps.npm-audit.outputs.status }}';
            const npmAuditResult = '${{ steps.npm-audit.outputs.result }}';
            const phpstanStatus = '${{ steps.phpstan.outputs.status }}';
            const phpstanResult = '${{ steps.phpstan.outputs.result }}';
            const phpSecurityStatus = '${{ steps.php-security.outputs.status }}';
            const phpSecurityResult = '${{ steps.php-security.outputs.result }}';
            const jsFiles = ${{ steps.file-count.outputs.js_count || 0 }};
            const phpFiles = ${{ steps.file-count.outputs.php_count || 0 }};
            const cssFiles = ${{ steps.file-count.outputs.css_count || 0 }};

            const criticalPassed = prettierStatus === 'success' && eslintStatus === 'success' && phpstanStatus === 'success';
            const allPassed = criticalPassed && npmAuditStatus === 'success' && phpSecurityStatus === 'success';

            const overallStatus = allPassed ? '✅' : criticalPassed ? '⚠️' : '❌';
            const overallMessage = allPassed
              ? 'All automated checks passed! Great work! 🎉'
              : criticalPassed
              ? 'Core quality checks passed. Some advisories to review. 👇'
              : 'Some critical checks failed. Please review the issues below. 👇';

            const body = `
            ## ${overallStatus} Code Quality & Security Analysis

            ${overallMessage}

            ### Code Quality Checks

            | Check | Status | Details |
            | ----- | ------ | ------- |
            | **Prettier** | ${prettierStatus === 'success' ? '✅ Pass' : '❌ Fail'} | ${prettierResult} |
            | **ESLint** | ${eslintStatus === 'success' ? '✅ Pass' : '⚠️ Issues'} | ${eslintResult} |
            | **PHPStan** | ${phpstanStatus === 'success' ? '✅ Pass' : '⚠️ Issues'} | ${phpstanResult} |

            ### Security Scans

            | Check | Status | Details |
            | ----- | ------ | ------- |
            | **NPM Audit** | ${npmAuditStatus === 'success' ? '✅ Pass' : npmAuditStatus === 'warning' ? '⚠️ Advisory' : '❌ Fail'} | ${npmAuditResult} |
            | **PHP Security** | ${phpSecurityStatus === 'success' ? '✅ Pass' : phpSecurityStatus === 'warning' ? '⚠️ Advisory' : phpSecurityStatus === 'skipped' ? '⏭️ Skipped' : '❌ Fail'} | ${phpSecurityResult} |

            ### Files Changed
            - 📜 JavaScript: ${jsFiles} file(s)
            - 🐘 PHP: ${phpFiles} file(s)
            - 🎨 CSS: ${cssFiles} file(s)

            ### Recommendations
            ${allPassed ? '- ✅ Code quality and security looks good!' : criticalPassed ? '- 🔧 Core checks passed, review security advisories above\n- Run \`npm audit\` and \`composer audit\` for vulnerability details' : '- 🔧 Please fix the issues identified above\n- Run \`npm run format\` and \`npm run lint:fix\` for auto-fixable issues\n- Check the Actions tab for detailed error logs'}

            ---
            *Automated Code Quality & Security Scan. For manual review, please request a code review from a team member.*
            `;

            // Post as a PR comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

            // Set check run status
            const checkName = 'Code Quality & Security Analysis';
            const conclusion = allPassed ? 'success' : criticalPassed ? 'neutral' : 'failure';

            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: checkName,
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: conclusion,
              output: {
                title: checkName,
                summary: overallMessage
              }
            });