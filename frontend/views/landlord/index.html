<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landlord Dashboard - Boarding House Management</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/components/nav.css">
  <link rel="stylesheet" href="/css/components/buttons.css">
  <link rel="stylesheet" href="/css/components/cards.css">
  <link rel="stylesheet" href="/css/components/forms.css">
  <link rel="stylesheet" href="/css/views/landlord.css">
</head>
<body>
  <!-- Navigation -->
  <nav id="nav-container"></nav>

  <!-- Header -->
  <header id="header-container"></header>

  <main class="dashboard">
    <aside class="dashboard-sidebar">
      <nav class="dashboard-nav">
        <a href="#properties" class="dashboard-tab active">Properties</a>
        <a href="#tenants" class="dashboard-tab">Tenants</a>
        <a href="#bookings" class="dashboard-tab">Bookings</a>
        <a href="#payments" class="dashboard-tab">Payments</a>
        <a href="#settings" class="dashboard-tab">Settings</a>
      </nav>
    </aside>

    <section class="dashboard-content">
      <div class="dashboard-header">
        <h1>Landlord Dashboard</h1>
        <button id="add-property-btn" class="btn primary">+ Add Property</button>
      </div>

      <!-- Properties Section -->
      <section id="properties" class="dashboard-section">
        <h2>My Properties</h2>
        <div id="properties-list" class="properties-grid">
          <!-- Properties loaded dynamically -->
        </div>
      </section>

      <!-- Tenants Section -->
      <section id="tenants" class="dashboard-section hidden">
        <h2>Tenants</h2>
        <div class="tenant-tabs">
          <button class="tenant-tab active" data-filter="all">All</button>
          <button class="tenant-tab" data-filter="active">Active</button>
          <button class="tenant-tab" data-filter="pending">Pending</button>
        </div>
        <div id="tenants-list">
          <!-- Tenants loaded dynamically -->
        </div>
      </section>

      <!-- Notifications -->
      <section id="notifications" class="notifications-panel">
        <h2>Notifications</h2>
        <!-- Notifications loaded dynamically -->
      </section>
    </section>
  </main>

  <!-- Footer -->
  <footer id="footer-container"></footer>

  <!-- Theme Toggle -->
  <button id="theme-toggle" class="theme-toggle">🌓</button>

  <!-- ES Module Entry Point -->
  <script type="module" src="/js/main.js"></script>
</body>
</html>
