<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing - Boarding House Management</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/components/nav.css">
  <link rel="stylesheet" href="/css/components/buttons.css">
  <link rel="stylesheet" href="/css/components/cards.css">
  <link rel="stylesheet" href="/css/views/landing.css">
</head>
<body>
  <!-- Navigation -->
  <nav id="nav-container"></nav>

  <!-- Header -->
  <header id="header-container"></header>

  <main>
    <!-- Hero Section -->
    <section class="hero">
      <h1>Welcome to Boarding House Management</h1>
      <p>Your one-stop platform for managing boarding house rentals</p>
      <div class="hero-actions">
        <button class="cta-button primary" data-action="register">Become a Landlord</button>
        <button class="cta-button secondary" data-action="login">Login</button>
      </div>
    </section>

    <!-- Features Section -->
    <section class="features">
      <h2>Our Features</h2>
      <div class="features-grid">
        <div class="feature-card">
          <h3>🏠 Property Management</h3>
          <p>Easily manage your rental properties</p>
        </div>
        <div class="feature-card">
          <h3>👥 Tenant Management</h3>
          <p>Keep track of your tenants and bookings</p>
        </div>
        <div class="feature-card">
          <h3>💰 Payment Tracking</h3>
          <p>Monitor payments and financial reports</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer id="footer-container"></footer>

  <!-- ES Module Entry Point -->
  <script type="module" src="/js/main.js"></script>
</body>
</html>
