<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing - Boarding House Management</title>
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/components/nav.css" />
    <link rel="stylesheet" href="/css/components/buttons.css" />
    <link rel="stylesheet" href="/css/components/cards.css" />
    <link rel="stylesheet" href="/css/views/landing.css" />
  </head>
  <body>
    <!-- Dashed Top Fade Grid Background -->
    <div class="landing-container">
      <div
        class="landing-grid-bg"
        style="
          background-image: linear-gradient(to right, #e7e5e4 1px, transparent 1px),
            linear-gradient(to bottom, #e7e5e4 1px, transparent 1px);
          background-size: 20px 20px;
          background-position: 0 0, 0 0;
          -webkit-mask-image: repeating-linear-gradient(
              to right,
              black 0px,
              black 3px,
              transparent 3px,
              transparent 8px
            ),
            repeating-linear-gradient(
              to bottom,
              black 0px,
              black 3px,
              transparent 3px,
              transparent 8px
            ),
            radial-gradient(ellipse 70% 60% at 50% 0%, #000 60%, transparent 100%);
          mask-image: repeating-linear-gradient(
              to right,
              black 0px,
              black 3px,
              transparent 3px,
              transparent 8px
            ),
            repeating-linear-gradient(
              to bottom,
              black 0px,
              black 3px,
              transparent 3px,
              transparent 8px
            ),
            radial-gradient(ellipse 70% 60% at 50% 0%, #000 60%, transparent 100%);
          -webkit-mask-composite: source-in;
          mask-composite: intersect;
        "
      ></div>
      <div class="landing-content">
        <!-- Navigation -->
        <nav id="nav-container"></nav>

        <!-- Header -->
        <header id="header-container"></header>

        <main></main>
      </div>
    </div>

    <!-- Footer -->
    <footer id="footer-container"></footer>

    <!-- ES Module Entry Point -->
    <script type="module" src="/js/main.js"></script>
  </body>
</html>
