<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - Reset Your Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/frontend/css/global.css" />
    <link rel="stylesheet" href="/frontend/css/views/auth.css" />
  </head>
  <body>
    <!-- Step 1: Email Input (Split Layout) -->
    <div class="auth-split-container" id="step1">
      <!-- Left Side - Form -->
      <div class="auth-split-left">
        <!-- Header -->
        <header class="auth-split-header">
          <a href="/" class="auth-logo">
            <svg
              width="100"
              height="32"
              viewBox="0 0 100 32"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <text
                x="0"
                y="24"
                font-family="Plus Jakarta Sans"
                font-size="24"
                font-weight="700"
                fill="#1a1a1a"
              >
                Haven Space
              </text>
            </svg>
          </a>
          <p class="auth-split-header-link">
            Remember your password? <a href="login.html">Log In</a>
          </p>
        </header>

        <!-- Form -->
        <main class="auth-split-content">
          <div class="auth-split-form-wrapper">
            <h1 class="auth-split-title">Forgot Password?</h1>
            <p class="auth-split-subtitle">
              No worries! Enter your email and we'll send you a reset code.
            </p>

            <form class="auth-form" id="forgotPasswordForm">
              <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="form-input"
                  placeholder="Enter your email"
                  required
                />
              </div>

              <button type="submit" class="auth-btn-primary auth-btn-full">Send Reset Code</button>
            </form>

            <p class="auth-split-footer">© 2024. All Rights Reserved.</p>
          </div>
        </main>
      </div>

      <!-- Right Side - Image -->
      <div class="auth-split-right">
        <div class="auth-split-image-container">
          <img
            src="/frontend/assets/images/public/login.png"
            alt="Dashboard Preview"
            class="auth-split-image"
          />
        </div>
      </div>
    </div>

    <!-- Step 2: Code Verification (Centered Layout) -->
    <main class="auth-main hidden" id="step2">
      <div class="auth-container auth-container-narrow">
        <button class="back-btn" id="backBtn">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
          Back
        </button>

        <h1 class="auth-title auth-title-small">Enter Verification Code</h1>
        <p class="auth-code-subtitle">
          We've sent a 6-digit code to <span id="emailDisplay"></span>
        </p>

        <form class="auth-form" id="verificationForm">
          <div class="code-input-container">
            <input
              type="text"
              class="code-input"
              maxlength="1"
              pattern="[0-9]"
              inputmode="numeric"
              required
            />
            <input
              type="text"
              class="code-input"
              maxlength="1"
              pattern="[0-9]"
              inputmode="numeric"
              required
            />
            <input
              type="text"
              class="code-input"
              maxlength="1"
              pattern="[0-9]"
              inputmode="numeric"
              required
            />
            <input
              type="text"
              class="code-input"
              maxlength="1"
              pattern="[0-9]"
              inputmode="numeric"
              required
            />
            <input
              type="text"
              class="code-input"
              maxlength="1"
              pattern="[0-9]"
              inputmode="numeric"
              required
            />
            <input
              type="text"
              class="code-input"
              maxlength="1"
              pattern="[0-9]"
              inputmode="numeric"
              required
            />
          </div>

          <button type="submit" class="auth-btn-primary auth-btn-full">Verify Code</button>
        </form>

        <div class="auth-code-resend">
          <p>Didn't receive the code? <a href="#" id="resendLink">Resend</a></p>
          <p class="resend-timer hidden" id="resendTimer">Resend code in <span>30</span>s</p>
        </div>

        <p class="auth-footer-text">Remember your password? <a href="login.html">Log In</a></p>
      </div>
    </main>

    <script src="/frontend/js/auth/forgot-password.js"></script>
  </body>
</html>
