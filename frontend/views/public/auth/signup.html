<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Find Your Place</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/frontend/css/global.css" />
    <link rel="stylesheet" href="/frontend/css/views/auth.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="auth-header">
      <div class="auth-header-content">
        <a href="/" class="auth-logo">
          <svg
            width="100"
            height="32"
            viewBox="0 0 100 32"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <text
              x="0"
              y="24"
              font-family="Plus Jakarta Sans"
              font-size="24"
              font-weight="700"
              fill="#1a1a1a"
            >
              Haven Space
            </text>
          </svg>
        </a>
        <div class="auth-header-link hidden" id="headerLinkContainer">
          <span id="headerLinkText"></span>
          <a href="#" id="headerRoleLink"></a>
        </div>
      </div>
    </header>

    <!-- Step 1: Role Selection -->
    <main class="auth-main" id="step1">
      <div class="auth-container">
        <h1 class="auth-title">Join as a landlord or boarder</h1>

        <div class="role-selection">
          <label class="role-card" for="role-landlord">
            <input type="radio" name="role" id="role-landlord" value="landlord" hidden />
            <div class="role-card-content">
              <div class="role-icon">
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                  <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
              </div>
              <span class="role-radio"></span>
            </div>
            <p class="role-text">I'm a landlord,<br />looking for a boarder</p>
          </label>

          <label class="role-card" for="role-boarder">
            <input type="radio" name="role" id="role-boarder" value="boarder" hidden />
            <div class="role-card-content">
              <div class="role-icon">
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="3" y1="10" x2="21" y2="10"></line>
                  <path d="M9 22V12h6v10"></path>
                </svg>
              </div>
              <span class="role-radio"></span>
            </div>
            <p class="role-text">I'm a boarder,<br />looking for a room</p>
          </label>
        </div>

        <button class="auth-btn-primary" id="continueBtn" disabled>Continue</button>

        <p class="auth-footer-text">Already have an account? <a href="/login">Log In</a></p>
      </div>
    </main>

    <!-- Step 2: Signup Form -->
    <main class="auth-main hidden" id="step2">
      <div class="auth-container auth-container-narrow">
        <h1 class="auth-title auth-title-small" id="step2Title">
          Sign up to find <span id="roleTitleText">your perfect match</span>
        </h1>

        <div class="social-signup">
          <button class="social-btn social-btn-apple">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"
              />
            </svg>
            Continue with Apple
          </button>
          <button class="social-btn social-btn-google">
            <svg width="20" height="20" viewBox="0 0 24 24">
              <path
                fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              />
              <path
                fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              />
              <path
                fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              />
              <path
                fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              />
            </svg>
            Continue with Google
          </button>
        </div>

        <div class="auth-divider">
          <span>or</span>
        </div>

        <form class="auth-form" id="signupForm">
          <div class="form-row">
            <div class="form-group">
              <label for="firstName" class="form-label">First name</label>
              <input type="text" id="firstName" name="firstName" class="form-input" required />
            </div>
            <div class="form-group">
              <label for="lastName" class="form-label">Last name</label>
              <input type="text" id="lastName" name="lastName" class="form-input" required />
            </div>
          </div>

          <div class="form-group">
            <label for="email" class="form-label" id="emailLabel">Email</label>
            <input type="email" id="email" name="email" class="form-input" required />
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <div class="password-input-wrapper">
              <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                placeholder="Password (8 or more characters)"
                required
                minlength="8"
              />
              <button
                type="button"
                class="password-toggle"
                id="passwordToggle"
                aria-label="Toggle password visibility"
              >
                <svg
                  class="eye-open"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg
                  class="eye-closed hidden"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                  ></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="country" class="form-label">Country</label>
            <select id="country" name="country" class="form-input form-select">
              <option value="US">United States</option>
              <option value="CA">Canada</option>
              <option value="GB">United Kingdom</option>
              <option value="AU">Australia</option>
              <option value="PH">Philippines</option>
              <!-- Add more countries as needed -->
            </select>
          </div>

          <div class="form-checkbox-group">
            <label class="checkbox-label">
              <input type="checkbox" name="terms" required />
              <span class="checkmark"></span>
              <span class="checkbox-text"
                >Yes, I understand and agree to the <a href="#">Terms of Service</a>, including the
                <a href="#">User Agreement</a> and <a href="#">Privacy Policy</a>.</span
              >
            </label>
          </div>

          <button type="submit" class="auth-btn-primary auth-btn-full">Create my account</button>
        </form>

        <p class="auth-footer-text">Already have an account? <a href="/login">Log In</a></p>
      </div>
    </main>

    <script src="/frontend/js/auth/signup.js"></script>
  </body>
</html>
