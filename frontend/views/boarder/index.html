<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boarder Dashboard - Boarding House Management</title>
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/components/nav.css" />
    <link rel="stylesheet" href="/css/components/buttons.css" />
    <link rel="stylesheet" href="/css/components/cards.css" />
    <link rel="stylesheet" href="/css/components/forms.css" />
    <link rel="stylesheet" href="/css/views/boarder.css" />
  </head>
  <body>
    <!-- Navigation -->
    <nav id="nav-container"></nav>

    <!-- Header -->
    <header id="header-container"></header>

    <main class="dashboard">
      <aside class="dashboard-sidebar">
        <nav class="dashboard-nav">
          <a href="#properties" class="dashboard-tab active">Browse</a>
          <a href="#bookings" class="dashboard-tab">My Bookings</a>
          <a href="#favorites" class="dashboard-tab">Favorites</a>
          <a href="#messages" class="dashboard-tab">Messages</a>
          <a href="#settings" class="dashboard-tab">Settings</a>
        </nav>
      </aside>

      <section class="dashboard-content">
        <div class="dashboard-header">
          <h1>Find Your Home</h1>
        </div>

        <!-- Search Section -->
        <section class="search-section">
          <form id="property-search-form" class="search-form">
            <input type="text" name="location" placeholder="Location" class="search-input" />
            <select name="priceRange" class="search-select">
              <option value="">Price Range</option>
              <option value="0-500">$0 - $500</option>
              <option value="500-1000">$500 - $1000</option>
              <option value="1000+">$1000+</option>
            </select>
            <button type="submit" class="btn primary">Search</button>
          </form>

          <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="available">Available</button>
            <button class="filter-btn" data-filter="featured">Featured</button>
          </div>
        </section>

        <!-- Properties Grid -->
        <section id="properties-grid" class="properties-grid">
          <!-- Properties loaded dynamically -->
        </section>

        <!-- Bookings Section -->
        <section id="bookings" class="dashboard-section hidden">
          <h2>My Bookings</h2>
          <div id="bookings-list">
            <!-- Bookings loaded dynamically -->
          </div>
        </section>

        <!-- Favorites Section -->
        <section id="favorites" class="dashboard-section hidden">
          <h2>My Favorites</h2>
          <div id="favorites-list">
            <!-- Favorites loaded dynamically -->
          </div>
        </section>
      </section>
    </main>

    <!-- Footer -->
    <footer id="footer-container"></footer>

    <!-- Theme Toggle -->
    <button id="theme-toggle" class="theme-toggle">🌓</button>

    <!-- ES Module Entry Point -->
    <script type="module" src="/js/main.js"></script>
  </body>
</html>
