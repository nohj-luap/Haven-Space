services:
  # Backend API Service (Docker)
  - type: web
    name: haven-space-api
    env: docker
    rootDir: server
    region: singapore
    plan: starter
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health.php
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: '3600'
      - key: REFRESH_TOKEN_EXPIRATION
        value: '604800'
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSL_MODE
        value: REQUIRED
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://haven-space-api.onrender.com/api/auth/google/callback.php
      - key: ALLOWED_ORIGINS
        sync: false

  # Frontend Static Site (Free)
  - type: web
    name: haven-space-frontend
    env: static
    rootDir: .
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /client/views/public/index.html
    envVars:
      - key: NODE_VERSION
        value: 20
